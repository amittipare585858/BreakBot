<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" 
          content="width=device-width, 
                   initial-scale=1.0">
    <title>BreakBot — AI Red-Team Agent</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --red: #ff3b3b;
            --red-dark: #cc0000;
            --red-light: #ff6b6b;
            --bg: #080810;
            --bg-2: #0c0c18;
            --bg-3: #12122a;
            --bg-4: #1a1a3a;
            --white: #ffffff;
            --gray: #a0a0c0;
            --gray-dark: #555580;
            --gray-darker: #333360;
        }
        *, *::before, *::after {
            margin: 0; padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--white);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── APP LAYOUT ── */
        .app {
            display: none;
            height: 100vh;
            overflow: hidden;
        }
        .app.active { display: flex; }
        
        /* ── SIDEBAR ── */
        .sidebar {
            width: 240px;
            min-width: 240px;
            background: var(--bg-2);
            border-right: 1px solid var(--bg-4);
            display: flex;
            flex-direction: column;
            padding: 28px 16px;
            height: 100vh;
            overflow-y: auto;
        }
        .sidebar-logo {
            font-size: 18px;
            font-weight: 900;
            letter-spacing: 4px;
            color: var(--red);
            margin-bottom: 4px;
        }
        .sidebar-tagline {
            font-size: 9px;
            color: var(--gray-darker);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 24px;
        }
        .sidebar-divider {
            border: none;
            border-top: 1px solid var(--bg-4);
            margin: 16px 0;
        }
        .user-card {
            background: var(--bg-3);
            border: 1px solid var(--bg-4);
            border-radius: 10px;
            padding: 12px 14px;
            margin-bottom: 20px;
        }
        .user-name {
            font-weight: 700;
            font-size: 14px;
            color: var(--white);
        }
        .user-email {
            font-size: 11px;
            color: var(--gray-dark);
            margin-top: 2px;
        }
        .nav-label {
            font-size: 9px;
            color: var(--gray-darker);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .nav-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            padding: 9px 14px;
            border-radius: 8px;
            border: 1px solid var(--bg-4);
            background: transparent;
            color: var(--gray);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 6px;
            font-family: 'Inter', sans-serif;
            text-align: left;
        }
        .nav-btn:hover {
            background: rgba(255,59,59,0.08);
            border-color: rgba(255,59,59,0.3);
            color: var(--red-light);
            transform: translateX(3px);
        }
        .nav-btn.active {
            background: rgba(255,59,59,0.1);
            border-color: rgba(255,59,59,0.3);
            color: var(--red-light);
            font-weight: 600;
        }
        .logout-btn {
            margin-top: auto;
            width: 100%;
            padding: 9px 14px;
            border-radius: 8px;
            border: 1px solid var(--bg-4);
            background: transparent;
            color: var(--gray-dark);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }
        .logout-btn:hover {
            border-color: rgba(255,59,59,0.3);
            color: var(--red-light);
        }

        /* ── MAIN CONTENT ── */
        .main {
            flex: 1;
            overflow-y: auto;
            padding: 40px 48px;
            background: var(--bg);
        }

        /* ── LOGIN PAGE ── */
        .login-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            position: relative;
            overflow: hidden;
        }
        .login-bg {
            position: absolute;
            inset: 0;
            background: radial-gradient(
                ellipse 60% 50% at 50% 0%,
                rgba(255,59,59,0.08) 0%,
                transparent 70%);
        }
        .login-card {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            padding: 24px;
        }
        .login-logo {
            text-align: center;
            margin-bottom: 40px;
        }
        .login-logo h1 {
            font-size: 36px;
            font-weight: 900;
            letter-spacing: 5px;
            color: var(--red);
            margin-bottom: 8px;
        }
        .login-logo p {
            font-size: 11px;
            color: var(--gray-darker);
            text-transform: uppercase;
            letter-spacing: 3px;
        }
        .login-box {
            background: var(--bg-2);
            border: 1px solid var(--bg-4);
            border-radius: 16px;
            padding: 32px 28px;
            box-shadow: 0 20px 60px 
                rgba(0,0,0,0.5);
        }
        .tabs {
            display: flex;
            background: var(--bg-3);
            border-radius: 10px;
            padding: 4px;
            margin-bottom: 28px;
            border: 1px solid var(--bg-4);
        }
        .tab-btn {
            flex: 1;
            padding: 9px;
            border: none;
            border-radius: 8px;
            background: transparent;
            color: var(--gray-dark);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }
        .tab-btn.active {
            background: var(--red);
            color: white;
            font-weight: 700;
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .form-group { margin-bottom: 18px; }
        .form-group label {
            display: block;
            font-size: 10px;
            font-weight: 700;
            color: var(--gray-dark);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        .form-group input {
            width: 100%;
            background: var(--bg-3);
            border: 1px solid var(--bg-4);
            border-radius: 8px;
            padding: 11px 14px;
            color: var(--white);
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-group input:focus {
            border-color: rgba(255,59,59,0.5);
            box-shadow: 0 0 0 3px 
                rgba(255,59,59,0.1);
        }
        .form-group input::placeholder {
            color: var(--gray-darker);
        }
        .submit-btn {
            width: 100%;
            background: linear-gradient(
                135deg, var(--red), var(--red-dark));
            color: white;
            border: none;
            border-radius: 8px;
            padding: 13px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
            letter-spacing: 0.3px;
            box-shadow: 0 4px 16px 
                rgba(255,59,59,0.3);
        }
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px 
                rgba(255,59,59,0.4);
        }
        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .demo-hint {
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid var(--bg-3);
            font-size: 12px;
            color: var(--gray-darker);
            text-align: center;
        }
        .demo-hint code {
            background: var(--bg-3);
            color: var(--red-light);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
        }

        /* ── STEP HEADER ── */
        .step-header {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 16px 22px;
            background: linear-gradient(
                135deg, #120808, #1a0a0a);
            border-left: 3px solid var(--red);
            border-radius: 0 12px 12px 0;
            margin: 28px 0 20px;
            font-size: 15px;
            font-weight: 700;
            color: var(--white);
            box-shadow: 0 4px 20px 
                rgba(255,59,59,0.08);
        }
        .step-num {
            background: var(--red);
            color: white;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 800;
            flex-shrink: 0;
        }

        /* ── INPUT AREA ── */
        .code-input {
            width: 100%;
            background: var(--bg-2);
            border: 1px solid var(--bg-4);
            border-radius: 10px;
            padding: 16px;
            color: var(--white);
            font-family: 'JetBrains Mono', 
                         monospace;
            font-size: 13px;
            min-height: 220px;
            outline: none;
            resize: vertical;
            transition: border-color 0.2s;
            line-height: 1.6;
        }
        .code-input:focus {
            border-color: rgba(255,59,59,0.4);
            box-shadow: 0 0 0 3px 
                rgba(255,59,59,0.08);
        }
        .code-input::placeholder {
            color: var(--gray-darker);
        }
        .filename-input {
            width: 100%;
            background: var(--bg-2);
            border: 1px solid var(--bg-4);
            border-radius: 8px;
            padding: 10px 14px;
            color: var(--white);
            font-family: 'JetBrains Mono', 
                         monospace;
            font-size: 13px;
            outline: none;
            margin-top: 12px;
            transition: border-color 0.2s;
        }
        .filename-input:focus {
            border-color: rgba(255,59,59,0.4);
        }

        /* ── ACTION BUTTON ── */
        .action-btn {
            background: linear-gradient(
                135deg, var(--red), var(--red-dark));
            color: white;
            border: none;
            border-radius: 10px;
            padding: 12px 28px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
            letter-spacing: 0.3px;
            box-shadow: 0 4px 16px 
                rgba(255,59,59,0.3);
            margin-top: 16px;
        }
        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px 
                rgba(255,59,59,0.4);
        }
        .action-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* ── CARDS ── */
        .card {
            background: var(--bg-2);
            border: 1px solid var(--bg-4);
            border-radius: 14px;
            padding: 24px;
            margin: 12px 0;
            transition: border-color 0.2s;
        }
        .card:hover {
            border-color: rgba(255,59,59,0.2);
        }
        .card-title {
            font-size: 10px;
            font-weight: 700;
            color: var(--gray-darker);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 16px;
        }

        /* ── METRICS ── */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin: 20px 0;
        }
        .metric-card {
            background: var(--bg-2);
            border: 1px solid var(--bg-4);
            border-radius: 14px;
            padding: 24px 20px;
            text-align: center;
            transition: all 0.2s;
        }
        .metric-card:hover {
            border-color: rgba(255,59,59,0.3);
            transform: translateY(-2px);
        }
        .metric-val {
            font-size: 44px;
            font-weight: 900;
            line-height: 1;
            margin-bottom: 8px;
        }
        .metric-label {
            font-size: 10px;
            color: var(--gray-darker);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
        }

        /* ── SEVERITY BADGES ── */
        .badge {
            display: inline-block;
            border-radius: 6px;
            padding: 4px 10px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.5px;
            margin: 3px;
        }
        .badge-critical {
            background: rgba(255,0,0,0.15);
            border: 1px solid rgba(255,0,0,0.4);
            color: #ff4444;
        }
        .badge-high {
            background: rgba(255,59,59,0.12);
            border: 1px solid rgba(255,59,59,0.35);
            color: #ff6b6b;
        }
        .badge-medium {
            background: rgba(255,180,0,0.12);
            border: 1px solid rgba(255,180,0,0.35);
            color: #ffcc44;
        }
        .badge-low {
            background: rgba(0,170,102,0.12);
            border: 1px solid rgba(0,170,102,0.35);
            color: #00dd88;
        }

        /* ── WEAK POINTS ── */
        .weak-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid var(--bg-3);
            font-size: 13px;
            color: var(--gray);
            line-height: 1.5;
        }
        .weak-item:last-child {
            border-bottom: none;
        }

        /* ── BUG ITEMS ── */
        .bug-item {
            background: rgba(255,59,59,0.05);
            border: 1px solid rgba(255,59,59,0.15);
            border-left: 3px solid var(--red);
            border-radius: 0 10px 10px 0;
            padding: 14px 18px;
            margin: 8px 0;
        }
        .bug-name {
            font-size: 13px;
            font-weight: 700;
            color: var(--red-light);
            margin-bottom: 6px;
        }
        .bug-error {
            font-size: 11px;
            color: var(--gray-dark);
            font-family: 'JetBrains Mono', 
                         monospace;
            line-height: 1.5;
        }

        /* ── FIX CARDS ── */
        .fix-card {
            background: var(--bg-3);
            border: 1px solid var(--bg-4);
            border-radius: 10px;
            padding: 18px;
            margin: 10px 0;
        }
        .fix-title {
            font-size: 13px;
            font-weight: 700;
            color: var(--red-light);
            margin-bottom: 8px;
        }
        .fix-code {
            background: var(--bg);
            border: 1px solid var(--bg-4);
            border-radius: 6px;
            padding: 12px;
            font-family: 'JetBrains Mono', 
                         monospace;
            font-size: 12px;
            color: #a8ff78;
            white-space: pre-wrap;
            word-break: break-all;
            margin: 10px 0;
            line-height: 1.5;
        }
        .fix-explanation {
            font-size: 12px;
            color: var(--gray);
            line-height: 1.6;
        }

        /* ── SCORE CARD ── */
        .score-card {
            background: linear-gradient(
                135deg, #120808, #1a0808);
            border: 1px solid 
                rgba(255,59,59,0.2);
            border-radius: 16px;
            padding: 28px;
            text-align: center;
            margin: 16px 0;
        }
        .score-num {
            font-size: 64px;
            font-weight: 900;
            line-height: 1;
            margin-bottom: 8px;
        }
        .score-label {
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .score-breakdown {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid 
                rgba(255,59,59,0.1);
            font-size: 12px;
            color: var(--gray-dark);
        }

        /* ── HISTORY ── */
        .history-card {
            background: var(--bg-2);
            border: 1px solid var(--bg-4);
            border-radius: 12px;
            padding: 18px 22px;
            margin: 10px 0;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .history-card:hover {
            border-color: rgba(255,59,59,0.3);
            transform: translateX(4px);
        }
        .history-num {
            font-size: 14px;
            font-weight: 700;
            color: var(--white);
            margin-bottom: 4px;
        }
        .history-date {
            font-size: 11px;
            color: var(--gray-dark);
        }
        .history-stats {
            display: flex;
            gap: 20px;
            text-align: center;
        }
        .history-stat-val {
            font-size: 20px;
            font-weight: 800;
        }
        .history-stat-label {
            font-size: 10px;
            color: var(--gray-darker);
            text-transform: uppercase;
        }

        /* ── LOADING ── */
        .loader {
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--gray);
            font-size: 13px;
            padding: 20px 0;
        }
        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid var(--bg-4);
            border-top-color: var(--red);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ── ALERTS ── */
        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 13px;
            margin: 10px 0;
        }
        .alert-error {
            background: rgba(255,59,59,0.08);
            border: 1px solid rgba(255,59,59,0.3);
            color: #ff6b6b;
        }
        .alert-success {
            background: rgba(0,170,102,0.08);
            border: 1px solid rgba(0,170,102,0.3);
            color: #00dd88;
        }
        .alert-info {
            background: rgba(100,100,255,0.08);
            border: 1px solid rgba(100,100,255,0.2);
            color: #8888ff;
        }

        /* ── REPORT SECTION ── */
        .report-header {
            background: linear-gradient(
                135deg, var(--red), var(--red-dark));
            color: white;
            padding: 22px 28px;
            border-radius: 14px 14px 0 0;
            font-size: 14px;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .report-body {
            background: var(--bg-2);
            border: 1px solid var(--bg-4);
            border-top: none;
            border-radius: 0 0 14px 14px;
            padding: 28px;
        }
        .report-section {
            margin-bottom: 28px;
            padding-bottom: 28px;
            border-bottom: 1px solid var(--bg-3);
        }
        .report-section:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }
        .report-section-title {
            font-size: 10px;
            font-weight: 700;
            color: var(--gray-darker);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 14px;
        }
        .fn-tag {
            display: inline-block;
            background: var(--bg-3);
            border: 1px solid var(--bg-4);
            border-radius: 6px;
            padding: 4px 12px;
            font-size: 12px;
            color: var(--gray);
            font-family: 'JetBrains Mono', 
                         monospace;
            margin: 3px;
        }

        /* ── DOWNLOAD BUTTONS ── */
        .download-btns {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        .dl-btn {
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .dl-btn-primary {
            background: linear-gradient(
                135deg, var(--red), var(--red-dark));
            color: white;
            border: none;
            box-shadow: 0 4px 12px 
                rgba(255,59,59,0.3);
        }
        .dl-btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px 
                rgba(255,59,59,0.4);
        }
        .dl-btn-secondary {
            background: transparent;
            color: var(--gray);
            border: 1px solid var(--bg-4);
        }
        .dl-btn-secondary:hover {
            border-color: rgba(255,59,59,0.3);
            color: var(--red-light);
        }

        /* ── DASHBOARD ── */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(
                auto-fit, minmax(180px, 1fr));
            gap: 16px;
            margin-bottom: 32px;
        }

        /* ── ADMIN TABLE ── */
        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        .data-table th {
            background: var(--bg-3);
            color: var(--gray-dark);
            padding: 10px 14px;
            text-align: left;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid var(--bg-4);
        }
        .data-table td {
            padding: 10px 14px;
            border-bottom: 1px solid var(--bg-3);
            color: var(--gray);
        }
        .data-table tr:hover td {
            background: rgba(255,59,59,0.03);
        }

        /* ── SCROLLBAR ── */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { 
            background: var(--bg); 
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255,59,59,0.3);
            border-radius: 2px;
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .main { padding: 24px 16px; }
            .metrics-grid { 
                grid-template-columns: 1fr; 
            }
        }
    </style>
</head>
<body>

<!-- LOGIN PAGE -->
<div class="login-page" id="loginPage">
    <div class="login-bg"></div>
    <div class="login-card">
        <div class="login-logo">
            <h1>BREAKBOT</h1>
            <p>AI Red-Team Security Agent</p>
        </div>
        <div class="login-box">
            <div class="tabs">
                <button class="tab-btn active" 
                    onclick="switchTab('login')">
                    Login
                </button>
                <button class="tab-btn" 
                    onclick="switchTab('register')">
                    Register
                </button>
            </div>

            <!-- Login Form -->
            <div class="tab-content active" 
                 id="loginTab">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" 
                           id="loginUser"
                           placeholder="Enter username">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" 
                           id="loginPass"
                           placeholder="Enter password"
                           onkeypress="if(event.key==='Enter')doLogin()">
                </div>
                <div id="loginAlert"></div>
                <button class="submit-btn" 
                        onclick="doLogin()"
                        id="loginBtn">
                    Login
                </button>
                <div class="demo-hint">
                    Demo: 
                    <code>demo</code> / 
                    <code>demo123</code>
                </div>
            </div>

            <!-- Register Form -->
            <div class="tab-content" 
                 id="registerTab">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" 
                           id="regUser"
                           placeholder="Choose username">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" 
                           id="regEmail"
                           placeholder="name@example.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" 
                           id="regPass"
                           placeholder="Min 6 characters">
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" 
                           id="regConfirm"
                           placeholder="Repeat password">
                </div>
                <div id="regAlert"></div>
                <button class="submit-btn" 
                        onclick="doRegister()"
                        id="regBtn">
                    Create Account
                </button>
            </div>
        </div>
    </div>
</div>

<!-- MAIN APP -->
<div class="app" id="mainApp">
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-logo">BREAKBOT</div>
        <div class="sidebar-tagline">
            AI Red-Team Agent
        </div>
        <hr class="sidebar-divider">
        <div class="user-card">
            <div class="user-name" id="sidebarUser">
            </div>
            <div class="user-email" id="sidebarEmail">
            </div>
        </div>
        <div class="nav-label">Navigation</div>
        <button class="nav-btn active" 
                id="nav-scan"
                onclick="navigate('scan')">
            Run Scan
        </button>
        <button class="nav-btn" 
                id="nav-history"
                onclick="navigate('history')">
            My History
        </button>
        <button class="nav-btn" 
                id="nav-dashboard"
                onclick="navigate('dashboard')">
            Dashboard
        </button>
        <button class="nav-btn" 
                id="nav-admin"
                onclick="navigate('admin')"
                style="display:none">
            Admin Panel
        </button>
        <hr class="sidebar-divider" 
            style="margin-top:auto">
        <button class="logout-btn" 
                onclick="doLogout()">
            Logout
        </button>
    </div>

    <!-- Main Content -->
    <div class="main" id="mainContent">
    </div>
</div>

<script>
// ── CONFIG ────────────────────────────────────
const API = 'https://breakbot-api.onrender.com';

// ── STATE ─────────────────────────────────────
let state = {
    user: null,
    analysis: null,
    attackCode: null,
    testResults: null,
    report: null,
    fixes: [],
    code: '',
    filename: 'pasted_code.py',
    history: [],
    selectedScan: null
};

// ── API CALLS ─────────────────────────────────
async function api(endpoint, method='GET', body=null) {
    const opts = {
        method,
        headers: { 'Content-Type': 'application/json' }
    };
    if (body) opts.body = JSON.stringify(body);
    const res = await fetch(`${API}${endpoint}`, opts);
    return res.json();
}

// ── AUTH ──────────────────────────────────────
function switchTab(tab) {
    document.querySelectorAll('.tab-btn')
        .forEach((b,i) => b.classList.toggle(
            'active', 
            (tab==='login'&&i===0) || 
            (tab==='register'&&i===1)));
    document.getElementById('loginTab')
        .classList.toggle('active', 
            tab==='login');
    document.getElementById('registerTab')
        .classList.toggle('active', 
            tab==='register');
}

async function doLogin() {
    const username = document.getElementById(
        'loginUser').value.trim();
    const password = document.getElementById(
        'loginPass').value.trim();
    const alertEl = document.getElementById(
        'loginAlert');
    const btn = document.getElementById(
        'loginBtn');
    
    if (!username || !password) {
        showAlert(alertEl, 
            'Please fill in all fields', 'error');
        return;
    }
    
    btn.disabled = true;
    btn.textContent = 'Logging in...';
    
    try {
        const data = await api(
            '/auth/login', 'POST', 
            { username, password });
        if (data.success) {
            state.user = data.user;
            enterApp();
        } else {
            showAlert(alertEl, 
                data.error || 
                'Invalid credentials', 'error');
        }
    } catch(e) {
        showAlert(alertEl, 
            'Connection error. Try again.', 'error');
    }
    
    btn.disabled = false;
    btn.textContent = 'Login';
}

async function doRegister() {
    const username = document.getElementById(
        'regUser').value.trim();
    const email = document.getElementById(
        'regEmail').value.trim();
    const password = document.getElementById(
        'regPass').value.trim();
    const confirm = document.getElementById(
        'regConfirm').value.trim();
    const alertEl = document.getElementById(
        'regAlert');
    const btn = document.getElementById(
        'regBtn');
    
    if (!username || !email || 
        !password || !confirm) {
        showAlert(alertEl, 
            'Please fill all fields', 'error');
        return;
    }
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){
        showAlert(alertEl, 
            'Invalid email format', 'error');
        return;
    }
    if (password.length < 6) {
        showAlert(alertEl, 
            'Password min 6 characters', 'error');
        return;
    }
    if (password !== confirm) {
        showAlert(alertEl, 
            'Passwords do not match', 'error');
        return;
    }
    
    btn.disabled = true;
    btn.textContent = 'Creating account...';
    
    try {
        const data = await api(
            '/auth/register', 'POST',
            { username, email, password });
        if (data.success) {
            showAlert(alertEl, 
                'Account created! Please login.', 
                'success');
            switchTab('login');
        } else {
            showAlert(alertEl, 
                data.error || 'Registration failed', 
                'error');
        }
    } catch(e) {
        showAlert(alertEl, 
            'Connection error', 'error');
    }
    
    btn.disabled = false;
    btn.textContent = 'Create Account';
}

function enterApp() {
    document.getElementById('loginPage')
        .style.display = 'none';
    document.getElementById('mainApp')
        .classList.add('active');
    document.getElementById('sidebarUser')
        .textContent = state.user.username;
    document.getElementById('sidebarEmail')
        .textContent = state.user.email;
    if (state.user.is_admin) {
        document.getElementById('nav-admin')
            .style.display = 'block';
    }
    navigate('scan');
}

function doLogout() {
    state = {
        user: null, analysis: null,
        attackCode: null, testResults: null,
        report: null, fixes: [], code: '',
        filename: 'pasted_code.py',
        history: [], selectedScan: null
    };
    document.getElementById('mainApp')
        .classList.remove('active');
    document.getElementById('loginPage')
        .style.display = 'flex';
}

// ── NAVIGATION ────────────────────────────────
function navigate(page) {
    document.querySelectorAll('.nav-btn')
        .forEach(b => b.classList.remove('active'));
    const btn = document.getElementById(
        `nav-${page}`);
    if (btn) btn.classList.add('active');
    
    const main = document.getElementById(
        'mainContent');
    
    if (page === 'scan') renderScan(main);
    else if (page === 'history') 
        renderHistory(main);
    else if (page === 'dashboard') 
        renderDashboard(main);
    else if (page === 'admin') 
        renderAdmin(main);
}

// ── SCAN PAGE ─────────────────────────────────
function renderScan(container) {
    container.innerHTML = `
        <div class="step-header">
            <div class="step-num">1</div>
            Input Code
        </div>
        <textarea class="code-input" 
            id="codeInput"
            placeholder="Paste your code here...
def divide(a, b):
    return a / b">${state.code}</textarea>
        <input class="filename-input" 
               type="text"
               id="filenameInput"
               value="${state.filename}"
               placeholder="filename.py">
        <button class="action-btn" 
                onclick="runAnalysis()">
            Analyze Code
        </button>
        <div id="analysisSection"></div>
        <div id="attackSection"></div>
        <div id="reportSection"></div>
    `;
    
    // Restore previous state
    if (state.analysis) showAnalysis();
    if (state.attackCode) showAttack();
    if (state.testResults) showReport();
}

async function runAnalysis() {
    state.code = document.getElementById(
        'codeInput').value;
    state.filename = document.getElementById(
        'filenameInput').value || 'pasted_code.py';
    
    if (!state.code.trim()) {
        alert('Please paste some code first');
        return;
    }
    
    const section = document.getElementById(
        'analysisSection');
    section.innerHTML = loader('Analyzing code...');
    
    // Reset state
    state.analysis = null;
    state.attackCode = null;
    state.testResults = null;
    state.report = null;
    document.getElementById(
        'attackSection').innerHTML = '';
    document.getElementById(
        'reportSection').innerHTML = '';
    
    try {
        const data = await api(
            '/scan/analyze', 'POST', {
            code: state.code,
            filename: state.filename,
            username: state.user.username
        });
        
        if (data.success) {
            state.analysis = data.analysis;
            showAnalysis();
        } else {
            section.innerHTML = alertHtml(
                data.error || 'Analysis failed', 
                'error');
        }
    } catch(e) {
        section.innerHTML = alertHtml(
            'Connection error', 'error');
    }
}

function showAnalysis() {
    const section = document.getElementById(
        'analysisSection');
    const wps = state.analysis.weak_points || [];
    const fns = state.analysis.functions || [];
    
    section.innerHTML = `
        <div class="step-header">
            <div class="step-num">2</div>
            Analysis Results
        </div>
        <div class="card">
            <div class="card-title">
                Weak Points Found (${wps.length})
            </div>
            ${wps.map(wp => `
            <div class="weak-item">
                <span class="${badgeClass(wp)}">
                    ${getSeverity(wp)}
                </span>
                <span>${wp}</span>
            </div>`).join('') || 
            '<p style="color:var(--gray-dark)">No weak points found</p>'}
        </div>
        <button class="action-btn" 
                onclick="runAttack()">
            Launch Attack
        </button>
    `;
}

async function runAttack() {
    const section = document.getElementById(
        'attackSection');
    section.innerHTML = loader(
        'Generating adversarial tests...');
    
    try {
        const data = await api(
            '/scan/attack', 'POST', {
            code: state.code,
            filename: state.filename,
            username: state.user.username
        });
        
        if (data.success) {
            state.attackCode = data.attack_code;
            showAttack();
        } else {
            section.innerHTML = alertHtml(
                data.error || 'Attack failed', 
                'error');
        }
    } catch(e) {
        section.innerHTML = alertHtml(
            'Connection error', 'error');
    }
}

function showAttack() {
    const section = document.getElementById(
        'attackSection');
    section.innerHTML = `
        <div class="step-header">
            <div class="step-num">3</div>
            Attack Cases Generated
        </div>
        <div class="card">
            <div class="card-title">
                Generated Test Cases
            </div>
            <pre class="fix-code">${
                escHtml(state.attackCode || '')
            }</pre>
        </div>
        <button class="action-btn" 
                onclick="runTests()">
            Run Tests
        </button>
    `;
}

async function runTests() {
    const section = document.getElementById(
        'reportSection');
    section.innerHTML = loader(
        'Running tests and generating report...');
    
    try {
        const data = await api(
            '/scan/report', 'POST', {
            code: state.code,
            filename: state.filename,
            username: state.user.username
        });
        
        if (data.success) {
            state.testResults = data.results;
            state.fixes = data.fixes || [];
            state.report = data.report;
            showReport();
        } else {
            section.innerHTML = alertHtml(
                data.error || 'Test failed', 
                'error');
        }
    } catch(e) {
        section.innerHTML = alertHtml(
            'Connection error', 'error');
    }
}

function showReport() {
    const section = document.getElementById(
        'reportSection');
    const results = state.testResults || {};
    const total = results.total || 0;
    const passed = results.passed || 0;
    const failed = results.failed || 0;
    const failures = results.failures || [];
    const wps = state.analysis?.weak_points || [];
    const fns = state.analysis?.functions || [];
    const score = calcScore(wps.length, failed, total);
    
    section.innerHTML = `
        <div class="step-header">
            <div class="step-num">4</div>
            Run & Report
        </div>
        
        <!-- Metrics -->
        <div class="metrics-grid">
            <div class="metric-card">
                <div class="metric-val" 
                     style="color:#e8e8f0">
                     ${total}</div>
                <div class="metric-label">
                    Total Tests</div>
            </div>
            <div class="metric-card">
                <div class="metric-val" 
                     style="color:#00dd88">
                     ${passed}</div>
                <div class="metric-label">
                    Passed</div>
            </div>
            <div class="metric-card">
                <div class="metric-val" 
                     style="color:#ff3b3b">
                     ${failed}</div>
                <div class="metric-label">
                    Failed</div>
            </div>
        </div>

        <!-- Score -->
        <div class="score-card">
            <div class="score-num" 
                 style="color:${scoreColor(score)}">
                ${score}
            </div>
            <div class="score-label" 
                 style="color:${scoreColor(score)}">
                ${scoreLabel(score)}
            </div>
            <div class="score-breakdown">
                <span>Security Score / 100</span>
            </div>
        </div>

        <!-- Report -->
        <div class="report-header">
            Bug Attack Report
        </div>
        <div class="report-body">
            <!-- Functions -->
            ${fns.length ? `
            <div class="report-section">
                <div class="report-section-title">
                    Functions Analyzed (${fns.length})
                </div>
                ${fns.map(f => 
                    `<span class="fn-tag">${f}</span>`
                ).join('')}
            </div>` : ''}

            <!-- Weak Points -->
            ${wps.length ? `
            <div class="report-section">
                <div class="report-section-title">
                    Vulnerabilities (${wps.length})
                </div>
                ${wps.map(wp => `
                <div class="weak-item">
                    <span class="${badgeClass(wp)}">
                        ${getSeverity(wp)}
                    </span>
                    <span style="color:var(--gray);
                        font-size:13px;">${wp}</span>
                </div>`).join('')}
            </div>` : ''}

            <!-- Bugs -->
            ${failures.length ? `
            <div class="report-section">
                <div class="report-section-title">
                    Confirmed Bugs (${failures.length})
                </div>
                ${failures.map((f,i) => `
                <div class="bug-item">
                    <div class="bug-name">
                        Bug #${i+1}: ${f.test_name||''}
                    </div>
                    <div class="bug-error">
                        ${escHtml(
                            (f.error||'').slice(0,200)
                        )}
                    </div>
                </div>`).join('')}
            </div>` : ''}

            <!-- Fixes -->
            ${state.fixes.length ? `
            <div class="report-section">
                <div class="report-section-title">
                    Fix Suggestions (${
                        state.fixes.length})
                </div>
                ${state.fixes.map((fix,i) => `
                <div class="fix-card">
                    <div class="fix-title">
                        Fix #${i+1}: ${
                            (fix.weak_point||'')
                            .slice(0,60)}
                    </div>
                    <div style="font-size:12px;
                        color:var(--gray);
                        margin-bottom:8px;">
                        ${fix.issue||''}
                    </div>
                    ${fix.fix_code ? `
                    <pre class="fix-code">${
                        escHtml(fix.fix_code)
                    }</pre>` : ''}
                    <div class="fix-explanation">
                        ${fix.explanation||''}
                    </div>
                </div>`).join('')}
            </div>` : ''}
        </div>

        <!-- Download -->
        <div class="download-btns">
            <button class="dl-btn dl-btn-primary" 
                    onclick="downloadMD()">
                Download MD Report
            </button>
            <button class="dl-btn dl-btn-secondary"
                    onclick="downloadTxt()">
                Download TXT Report
            </button>
        </div>
    `;
}

// ── HISTORY PAGE ──────────────────────────────
async function renderHistory(container) {
    container.innerHTML = `
        <div class="step-header">
            <div class="step-num">H</div>
            My Scan History
        </div>
        ${loader('Loading history...')}
    `;
    
    try {
        const data = await api(
            `/history/${state.user.username}`);
        state.history = data.history || [];
        showHistoryList(container);
    } catch(e) {
        container.innerHTML += alertHtml(
            'Could not load history', 'error');
    }
}

function showHistoryList(container) {
    if (!state.history.length) {
        container.innerHTML = `
            <div class="step-header">
                <div class="step-num">H</div>
                My Scan History
            </div>
            <div class="card" 
                 style="text-align:center;
                        padding:40px;
                        color:var(--gray-dark);">
                No scans yet. 
                Run your first scan!
            </div>
        `;
        return;
    }
    
    container.innerHTML = `
        <div class="step-header">
            <div class="step-num">H</div>
            My Scan History
        </div>
        <p style="color:var(--gray-dark);
            font-size:13px;margin-bottom:16px;">
            ${state.history.length} scan(s). 
            Click to view details.
        </p>
        ${state.history.map((scan, i) => {
            const bugs = scan.bugs_found || 0;
            const wps = scan.weak_points_found || 0;
            const date = (scan.scanned_at||'')
                .slice(0,16);
            const bugColor = bugs > 3 
                ? '#ff3b3b' 
                : bugs > 0 ? '#ffcc44' : '#00dd88';
            return `
            <div class="history-card" 
                 onclick="showHistoryDetail(${i})">
                <div>
                    <div class="history-num">
                        Scan #${i+1}
                    </div>
                    <div class="history-date">
                        ${date}
                    </div>
                </div>
                <div class="history-stats">
                    <div>
                        <div class="history-stat-val"
                             style="color:var(--gray)">
                            ${wps}
                        </div>
                        <div class="history-stat-label">
                            Weak Pts
                        </div>
                    </div>
                    <div>
                        <div class="history-stat-val"
                             style="color:${bugColor}">
                            ${bugs}
                        </div>
                        <div class="history-stat-label">
                            Bugs
                        </div>
                    </div>
                </div>
            </div>`;
        }).join('')}
    `;
}

function showHistoryDetail(index) {
    const scan = state.history[index];
    const container = document.getElementById(
        'mainContent');
    const bugs = scan.bugs_found || 0;
    const wps = scan.weak_points_found || 0;
    
    container.innerHTML = `
        <div style="margin-bottom:20px;">
            <button class="dl-btn dl-btn-secondary"
                    onclick="renderHistory(
                        document.getElementById(
                            'mainContent'))">
                Back to History
            </button>
        </div>
        <div class="step-header">
            <div class="step-num">H</div>
            Scan #${index+1} Details
        </div>
        <div style="font-size:12px;
            color:var(--gray-dark);
            margin-bottom:20px;">
            ${(scan.scanned_at||'').slice(0,16)}
        </div>
        <div class="metrics-grid">
            <div class="metric-card">
                <div class="metric-val" 
                     style="color:#ff3b3b">
                     ${wps}</div>
                <div class="metric-label">
                    Weak Points</div>
            </div>
            <div class="metric-card">
                <div class="metric-val" 
                     style="color:#ff3b3b">
                     ${bugs}</div>
                <div class="metric-label">
                    Bugs Found</div>
            </div>
        </div>
        ${scan.report_content ? `
        <div class="report-header">
            Bug Attack Report
        </div>
        <div class="report-body">
            <pre style="white-space:pre-wrap;
                font-size:12px;
                color:var(--gray);
                line-height:1.6;
                font-family:'Inter',sans-serif;">
${escHtml(scan.report_content.slice(0,3000))}
            </pre>
        </div>
        <div class="download-btns">
            <button class="dl-btn dl-btn-primary"
                    onclick="downloadHistoryMD(${index})">
                Download Report
            </button>
        </div>` : ''}
    `;
}

// ── DASHBOARD ─────────────────────────────────
async function renderDashboard(container) {
    container.innerHTML = `
        <div class="step-header">
            <div class="step-num">D</div>
            Dashboard
        </div>
        ${loader('Loading dashboard...')}
    `;
    
    try {
        const data = await api(
            `/history/${state.user.username}`);
        const history = data.history || [];
        
        const totalScans = history.length;
        const totalBugs = history.reduce(
            (s,h) => s + (h.bugs_found||0), 0);
        const totalWPs = history.reduce(
            (s,h) => s + (h.weak_points_found||0), 
            0);
        const avgBugs = totalScans 
            ? (totalBugs/totalScans).toFixed(1) 
            : 0;
        
        container.innerHTML = `
            <div class="step-header">
                <div class="step-num">D</div>
                Dashboard
            </div>
            <div class="dashboard-grid">
                <div class="metric-card">
                    <div class="metric-val" 
                         style="color:#e8e8f0">
                         ${totalScans}</div>
                    <div class="metric-label">
                        Total Scans</div>
                </div>
                <div class="metric-card">
                    <div class="metric-val" 
                         style="color:#ff3b3b">
                         ${totalBugs}</div>
                    <div class="metric-label">
                        Total Bugs</div>
                </div>
                <div class="metric-card">
                    <div class="metric-val" 
                         style="color:#ffcc44">
                         ${avgBugs}</div>
                    <div class="metric-label">
                        Avg Bugs/Scan</div>
                </div>
                <div class="metric-card">
                    <div class="metric-val" 
                         style="color:#8888ff">
                         ${totalWPs}</div>
                    <div class="metric-label">
                        Weak Points</div>
                </div>
            </div>
            
            ${history.length > 1 ? `
            <div class="card">
                <div class="card-title">
                    Recent Scans
                </div>
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Date</th>
                            <th>Weak Points</th>
                            <th>Bugs Found</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${history.slice(0,10)
                            .map((h,i) => `
                        <tr>
                            <td>${i+1}</td>
                            <td>${
                                (h.scanned_at||'')
                                .slice(0,16)}</td>
                            <td>${
                                h.weak_points_found
                                ||0}</td>
                            <td style="color:${
                                h.bugs_found>0
                                ?'#ff3b3b':'#00dd88'
                            }">${h.bugs_found||0}</td>
                        </tr>`).join('')}
                    </tbody>
                </table>
            </div>` : `
            <div class="card" 
                 style="text-align:center;
                        padding:40px;
                        color:var(--gray-dark);">
                Run more scans to see 
                your dashboard stats!
            </div>`}
        `;
    } catch(e) {
        container.innerHTML += alertHtml(
            'Could not load dashboard', 'error');

}

// ── HELPERS ───────────────────────────────────
function getSeverity(wp) {
    const t = wp.toLowerCase();
    if (['sql injection','injection',
         'arbitrary code','password',
         'credential','overflow']
        .some(w => t.includes(w))) 
        return 'CRITICAL';
    if (['division','crash','null',
         'none','exception','syntax',
         'naming conflict']
        .some(w => t.includes(w))) 
        return 'HIGH';
    if (['truncat','file','resource',
         'leak','type','index','incomplete']
        .some(w => t.includes(w))) 
        return 'MEDIUM';
    return 'LOW';
}

function badgeClass(wp) {
    const s = getSeverity(wp);
    return `badge badge-${s.toLowerCase()}`;
}

function calcScore(wps, bugs, total) {
    let s = 100 - wps*5 - bugs*10;
    if (total > 0) {
        s = Math.round(s * (total-bugs)/total);
    }
    return Math.max(0, Math.min(100, s));
}

function scoreColor(score) {
    if (score >= 80) return '#00dd88';
    if (score >= 60) return '#ffcc44';
    if (score >= 40) return '#ff8c00';
    return '#ff3b3b';
}

function scoreLabel(score) {
    if (score >= 80) return 'SECURE';
    if (score >= 60) return 'MODERATE RISK';
    if (score >= 40) return 'VULNERABLE';
    return 'CRITICAL RISK';
}

function escHtml(str) {
    return String(str)
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;');
}

function loader(msg) {
    return `<div class="loader">
        <div class="spinner"></div>
        ${msg}
    </div>`;
}

function alertHtml(msg, type='error') {
    return `<div class="alert alert-${type}">
        ${msg}
    </div>`;
}

function showAlert(el, msg, type) {
    el.innerHTML = alertHtml(msg, type);
    setTimeout(() => { 
        if(el) el.innerHTML = ''; 
    }, 4000);
}

// ── DOWNLOADS ─────────────────────────────────
function downloadMD() {
    if (!state.report) return;
    const report = typeof state.report === 'string'
        ? state.report
        : JSON.stringify(state.report, null, 2);
    const blob = new Blob([report], 
        { type: 'text/markdown' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'BreakBot_Report.md';
    a.click();
}

function downloadTxt() {
    const wps = state.analysis?.weak_points || [];
    const results = state.testResults || {};
    let text = `BREAKBOT BUG ATTACK REPORT\n`;
    text += `Generated: ${new Date().toLocaleString()}\n`;
    text += `\nWEAK POINTS (${wps.length}):\n`;
    wps.forEach((wp,i) => {
        text += `${i+1}. [${getSeverity(wp)}] ${wp}\n`;
    });
    text += `\nTEST RESULTS:\n`;
    text += `Total: ${results.total||0}\n`;
    text += `Passed: ${results.passed||0}\n`;
    text += `Failed: ${results.failed||0}\n`;
    const blob = new Blob([text], 
        { type: 'text/plain' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'BreakBot_Report.txt';
    a.click();
}

function downloadHistoryMD(index) {
    const scan = state.history[index];
    if (!scan?.report_content) return;
    const blob = new Blob(
        [scan.report_content], 
        { type: 'text/markdown' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `BreakBot_Scan_${index+1}.md`;
    a.click();
}
